<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Curl Merge - カーリング合体パズル</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: radial-gradient(ellipse at top, #1a2540 0%, #060812 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    color: #fff;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 12px;
    gap: 12px;
  }
  .hud {
    display: flex;
    gap: 24px;
    align-items: center;
    font-weight: 700;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .label { font-size: 10px; opacity: 0.65; letter-spacing: 2px; text-transform: uppercase; }
  .value { font-size: 24px; font-variant-numeric: tabular-nums; }
  .stage {
    position: relative;
    border-radius: 16px;
    padding: 8px;
    background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
    box-shadow:
      0 20px 60px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }
  canvas {
    display: block;
    border-radius: 10px;
    background: radial-gradient(ellipse at 50% 30%, #1a1140 0%, #0a0820 60%, #020108 100%);
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
    touch-action: none;
    cursor: crosshair;
  }
  .next-display {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    opacity: 0.85;
  }
  .next-orb {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .hint {
    font-size: 11px;
    opacity: 0.5;
    letter-spacing: 1px;
    text-align: center;
  }
  button.reset {
    background: linear-gradient(180deg, #ff6b6b, #d43f3f);
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 100px;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(212,63,63,0.4);
  }
  button.reset:active { transform: scale(0.95); }
  .controls {
    position: absolute;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 20;
  }
  .icon-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    transition: transform 0.15s, background 0.15s;
  }
  .icon-btn:active { transform: scale(0.9); }
  .icon-btn.off { opacity: 0.4; }
</style>
</head>
<body>
  <div class="controls">
    <button class="icon-btn" id="sfxBtn" title="効果音">🔊</button>
    <button class="icon-btn" id="bgmBtn" title="BGM">🎵</button>
  </div>
  <div class="hud">
    <div class="stat">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="stat">
      <div class="label">Best</div>
      <div class="value" id="best">0</div>
    </div>
    <div class="stat">
      <div class="label">Max</div>
      <div class="value" id="maxTier">1</div>
    </div>
  </div>

  <div class="stage" id="stage">
    <canvas id="game" width="380" height="540"></canvas>
  </div>

  <div class="next-display">
    <span>NEXT</span>
    <div class="next-orb" id="nextOrb"></div>
    <span id="nextLabel" style="opacity:0.7;"></span>
  </div>

  <div class="hint">タップで真っ直ぐ発射 ／ 同色がぶつかると合体して進化</div>
  <div style="display:flex;gap:10px;align-items:center;">
    <button class="reset" id="resetBtn">リセット</button>
    <button class="reset" id="sunBtn" style="background:linear-gradient(180deg,#ffb040,#d47020);">☀️太陽テスト</button>
  </div>

<script>
// グローバルエラーハンドラ：エラーをコンソールに出すだけでアプリは止めない
window.addEventListener('error', function(e) {
  console.error('Global error caught:', e.message, e.filename, e.lineno);
  // trueを返してエラーを「処理済み」にする
  return true;
});
window.addEventListener('unhandledrejection', function(e) {
  console.error('Unhandled rejection:', e.reason);
  e.preventDefault();
});

(() => {
  // ========= 設定 =========
  const W = 380;
  const H = 540;
  const FRICTION = 0.985;
  const MIN_SPEED = 8;
  const SHOOT_SPEED = 520;
  const RESTITUTION_WALL = 0.85;
  const RESTITUTION_BALL = 0.92;
  const SHOOTER_Y = H - 40;

  // 10段階：月→水星→火星→金星→地球→海王星→天王星→木星→土星→太陽
  const TIERS = [
    { r: 14, type: 'moon',    color: '#c8c4bc', score: 1,    name: '月' },
    { r: 18, type: 'mercury', color: '#b8825a', score: 3,    name: '水星' },
    { r: 22, type: 'mars',    color: '#c1593c', score: 6,    name: '火星' },
    { r: 27, type: 'venus',   color: '#e8c878', score: 12,   name: '金星' },
    { r: 32, type: 'earth',   color: '#3a8fc2', score: 24,   name: '地球' },
    { r: 37, type: 'neptune', color: '#3858b8', score: 48,   name: '海王星' },
    { r: 43, type: 'uranus',  color: '#9adcd8', score: 96,   name: '天王星', hasRing: true },
    { r: 50, type: 'jupiter', color: '#d4a878', score: 192,  name: '木星' },
    { r: 58, type: 'saturn',  color: '#e0c896', score: 400,  name: '土星',   hasRing: true },
    { r: 70, type: 'sun',     color: '#ffcb40', score: 1000, name: '太陽',   isSun: true },
  ];

  // 新規スポーン可能なtier (0〜2まで。上位は合体でしか作れない)
  const SPAWN_MAX_TIER = 2;

  // ========= 状態 =========
  const canvas = document.getElementById('game');
  canvas.width = W;
  canvas.height = H;

  function fitCanvas() {
    // HUD・next表示・ボタン・余白を考慮して縦に収める
    const reservedHeight = 220; // 上下のUI分
    const availableHeight = window.innerHeight - reservedHeight;
    const availableWidth = window.innerWidth - 40;
    // 縦横どちらかに合わせる
    const widthFromHeight = availableHeight * (W / H);
    const finalWidth = Math.min(availableWidth, widthFromHeight, 420);
    canvas.style.width = finalWidth + 'px';
    canvas.style.height = (finalWidth * H / W) + 'px';
  }
  fitCanvas();
  window.addEventListener('resize', fitCanvas);
  window.addEventListener('orientationchange', fitCanvas);
  const ctx = canvas.getContext('2d');

  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const maxTierEl = document.getElementById('maxTier');
  const nextOrb = document.getElementById('nextOrb');
  const nextLabel = document.getElementById('nextLabel');
  const resetBtn = document.getElementById('resetBtn');

  let balls = [];
  let particles = [];
  let floatingTexts = [];
  let nextTier = randTier();
  let score = 0;
  let bestScore = 0;
  try { bestScore = parseInt(localStorage.getItem('curlMergeBest') || '0', 10) || 0; } catch(e) {}
  let maxTierReached = 0;
  let isAiming = false;
  let pointerX = W / 2;
  let pointerY = H / 2;
  let shake = { x: 0, y: 0, amp: 0 };
  let lastTime = performance.now();
  let canShoot = true;
  let cleared = false;
  let clearTime = 0;

  // ========= 背景（宇宙）データ =========
  let stars = [];          // {x, y, r, baseAlpha, twinkleSpeed, twinklePhase}
  let shootingStars = [];  // {x, y, vx, vy, life, maxLife, length}
  let nebulae = [];        // {x, y, r, color, alpha, drift}
  let galaxyAngle = 0;     // 銀河の渦の回転
  let bgTime = 0;          // 背景全体の時刻

  function initBackground() {
    stars = [];
    // 多めに作って、進化に応じて表示数を増やす
    for (let i = 0; i < 180; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: 0.4 + Math.random() * 1.4,
        baseAlpha: 0.3 + Math.random() * 0.7,
        twinkleSpeed: 0.5 + Math.random() * 2.5,
        twinklePhase: Math.random() * Math.PI * 2,
        // 大きい星はちょっとだけ色付き
        hue: Math.random() < 0.15 ? (Math.random() < 0.5 ? '#a0c4ff' : '#ffd0b0') : '#ffffff',
      });
    }
    // 星雲の塊（位置固定、ゆっくりドリフト）
    nebulae = [
      { x: W * 0.25, y: H * 0.3, r: 140, color: '#7c5bff', alpha: 0, drift: 0.05 },
      { x: W * 0.75, y: H * 0.55, r: 160, color: '#ff5bbf', alpha: 0, drift: -0.04 },
      { x: W * 0.5,  y: H * 0.8, r: 120, color: '#4dabff', alpha: 0, drift: 0.03 },
    ];
    shootingStars = [];
    galaxyAngle = 0;
  }
  initBackground();

  // ========= 音声システム =========
  let audioCtx = null;
  let masterGain = null;
  let bgmGain = null;
  let bgmStarted = false;
  let bgmNodes = [];
  let sfxEnabled = true;
  let bgmEnabled = true;
  try {
    sfxEnabled = localStorage.getItem('curlMergeSfx') !== '0';
    bgmEnabled = localStorage.getItem('curlMergeBgm') !== '0';
  } catch(e) {}

  function ensureAudio() {
    if (audioCtx) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      audioCtx = new AC();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.5;
      masterGain.connect(audioCtx.destination);
      bgmGain = audioCtx.createGain();
      bgmGain.gain.value = bgmEnabled ? 0.15 : 0;
      bgmGain.connect(masterGain);
    } catch(e) {}
  }

  // 単発トーン再生（合成音）
  function playTone({ freq, type = 'sine', dur = 0.1, vol = 0.3, sweep = 0, attack = 0.005, release = 0.1 }) {
    if (!sfxEnabled || !audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (sweep !== 0) {
      osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq + sweep), t + dur);
    }
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol, t + attack);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur + release);
    osc.connect(gain).connect(masterGain);
    osc.start(t);
    osc.stop(t + dur + release + 0.05);
  }

  // ノイズ系（壁ヒットの「カツン」感）
  function playNoise({ dur = 0.08, vol = 0.15, lowpass = 2000 }) {
    if (!sfxEnabled || !audioCtx) return;
    const t = audioCtx.currentTime;
    const bufferSize = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = lowpass;
    const gain = audioCtx.createGain();
    gain.gain.value = vol;
    src.connect(filter).connect(gain).connect(masterGain);
    src.start(t);
  }

  // ========= ゲーム内SE =========
  function sfxShoot() {
    playTone({ freq: 220, type: 'square', dur: 0.06, vol: 0.18, sweep: 280, release: 0.05 });
  }
  function sfxWall(speed) {
    const v = Math.min(1, speed / 400);
    playNoise({ dur: 0.06, vol: 0.08 + v * 0.12, lowpass: 800 + v * 1500 });
  }
  function sfxCollide(speed) {
    const v = Math.min(1, speed / 400);
    playTone({ freq: 180 + Math.random() * 40, type: 'triangle', dur: 0.04, vol: 0.08 + v * 0.1, release: 0.05 });
  }
  function sfxMerge(tier) {
    // ティアが上がるごとに高音＋豪華に
    const baseFreq = 330 * Math.pow(1.122, tier); // 半音ずつ上昇
    playTone({ freq: baseFreq, type: 'sine', dur: 0.12, vol: 0.25, release: 0.15 });
    setTimeout(() => playTone({ freq: baseFreq * 1.5, type: 'sine', dur: 0.1, vol: 0.2, release: 0.15 }), 40);
    setTimeout(() => playTone({ freq: baseFreq * 2, type: 'sine', dur: 0.08, vol: 0.15, release: 0.15 }), 80);
    if (tier >= 5) {
      // 高ティアはキラキラ追加
      setTimeout(() => playTone({ freq: baseFreq * 3, type: 'triangle', dur: 0.15, vol: 0.12, release: 0.2 }), 120);
    }
  }
  function sfxClear() {
    // ファンファーレ的アルペジオ
    const notes = [523, 659, 784, 1047, 1319, 1568]; // C-E-G-C-E-G
    notes.forEach((f, i) => {
      setTimeout(() => playTone({ freq: f, type: 'triangle', dur: 0.18, vol: 0.25, release: 0.3 }), i * 90);
    });
    setTimeout(() => {
      playTone({ freq: 1047, type: 'sine', dur: 0.5, vol: 0.3, release: 0.6 });
      playTone({ freq: 1319, type: 'sine', dur: 0.5, vol: 0.25, release: 0.6 });
      playTone({ freq: 1568, type: 'sine', dur: 0.5, vol: 0.2, release: 0.6 });
    }, 600);
  }

  // ========= BGM（アンビエント風シーケンサー） =========
  function startBGM() {
    if (!audioCtx || bgmStarted) return;
    bgmStarted = true;
    // ベースパッド（持続するC-E-Gの和音、ゆらぎ付き）
    const padFreqs = [130.81, 164.81, 196.00]; // C3, E3, G3
    for (const f of padFreqs) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      gain.gain.value = 0.08;
      lfo.frequency.value = 0.1 + Math.random() * 0.15;
      lfoGain.gain.value = 0.04;
      lfo.connect(lfoGain).connect(gain.gain);
      osc.connect(gain).connect(bgmGain);
      osc.start();
      lfo.start();
      bgmNodes.push(osc, lfo);
    }
    // メロディシーケンス（ゆっくりした音階）
    const scale = [523.25, 587.33, 659.25, 783.99, 880, 987.77]; // C5メジャーペンタっぽい
    let step = 0;
    function playStep() {
      if (!bgmStarted) return;
      if (Math.random() < 0.7) {
        const f = scale[Math.floor(Math.random() * scale.length)];
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.06, t + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
        osc.connect(gain).connect(bgmGain);
        osc.start(t);
        osc.stop(t + 1.5);
      }
      step++;
      setTimeout(playStep, 800 + Math.random() * 600);
    }
    setTimeout(playStep, 500);
  }

  function setSfx(on) {
    sfxEnabled = on;
    try { localStorage.setItem('curlMergeSfx', on ? '1' : '0'); } catch(e) {}
    document.getElementById('sfxBtn').classList.toggle('off', !on);
    document.getElementById('sfxBtn').textContent = on ? '🔊' : '🔇';
  }
  function setBgm(on) {
    bgmEnabled = on;
    try { localStorage.setItem('curlMergeBgm', on ? '1' : '0'); } catch(e) {}
    document.getElementById('bgmBtn').classList.toggle('off', !on);
    document.getElementById('bgmBtn').textContent = on ? '🎵' : '🎶';
    if (bgmGain && audioCtx) {
      bgmGain.gain.setTargetAtTime(on ? 0.15 : 0, audioCtx.currentTime, 0.1);
    }
  }

  // ========= バイブ =========
  function vibrate(pattern) {
    if (!sfxEnabled) return; // SFXミュート時はバイブも消す
    if (navigator.vibrate) {
      try { navigator.vibrate(pattern); } catch(e) {}
    }
  }

  function randTier() {
    return Math.floor(Math.random() * (SPAWN_MAX_TIER + 1));
  }

  // ========= 入力 =========
  function getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? (e.touches[0] || e.changedTouches[0]) : e;
    return {
      x: (t.clientX - rect.left) * (canvas.width / rect.width),
      y: (t.clientY - rect.top) * (canvas.height / rect.height),
    };
  }

  function onPointerDown(e) {
    e.preventDefault();
    // 初回タップで音声システム起動（ブラウザのオーディオロック解除）
    ensureAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (bgmEnabled && !bgmStarted) startBGM();
    const p = getPointerPos(e);
    pointerX = p.x; pointerY = p.y;
    isAiming = true;
  }
  function onPointerMove(e) {
    if (!isAiming) return;
    e.preventDefault();
    const p = getPointerPos(e);
    pointerX = p.x; pointerY = p.y;
  }
  function onPointerUp(e) {
    if (!isAiming) return;
    e.preventDefault();
    isAiming = false;
    if (!canShoot) return;
    const dx = pointerX - W/2;
    const dy = pointerY - SHOOTER_Y;
    const dist = Math.hypot(dx, dy);
    if (dist < 5) return;
    const nx = dx / dist;
    const ny = dy / dist;
    if (ny > -0.1) return; // 上方向限定
    shoot(nx, ny);
  }
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('mouseleave', () => { isAiming = false; });
  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  canvas.addEventListener('touchend', onPointerUp, { passive: false });
  canvas.addEventListener('touchcancel', () => { isAiming = false; });

  resetBtn.addEventListener('click', () => init());

  // 音声ボタン
  document.getElementById('sfxBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    ensureAudio();
    setSfx(!sfxEnabled);
  });
  document.getElementById('bgmBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    ensureAudio();
    setBgm(!bgmEnabled);
    if (bgmEnabled) startBGM();
  });
  // 太陽デモ：ワンタップで太陽生成→クリア演出
  document.getElementById('sunBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    ensureAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    // 太陽を1つ盤面中央に出すだけ（テスト用）
    balls = [];
    particles = [];
    floatingTexts = [];
    const sun = makeBall(W/2, H/2, TIERS.length - 1, 0, 0);
    balls.push(sun);
    maxTierReached = TIERS.length - 1;
    updateHUD();
  });
  // 初期表示反映
  setSfx(sfxEnabled);
  setBgm(bgmEnabled);

  // ========= 玉 =========
  function makeBall(x, y, tier, vx = 0, vy = 0) {
    return {
      x, y, vx, vy, tier,
      r: TIERS[tier].r,
      mass: TIERS[tier].r * TIERS[tier].r,
      mergeFlash: 0,
      rotPhase: Math.random() * Math.PI * 2,  // 自転の初期位相
      ringTilt: -0.35 + Math.random() * 0.15, // リングの傾き（土星・天王星用）
      seed: Math.random(),                     // 個体差用
    };
  }

  function shoot(nx, ny) {
    const b = makeBall(W/2, SHOOTER_Y, nextTier, nx * SHOOT_SPEED, ny * SHOOT_SPEED);
    balls.push(b);
    nextTier = randTier();
    updateNextDisplay();
    canShoot = false;
    setTimeout(() => { canShoot = true; }, 250);
    sfxShoot();
    vibrate(15);
  }

  // ========= 物理更新 =========
  function update(dt) {
    updateBackground(dt);

    for (const b of balls) {
      if (b.mergeFlash > 0) b.mergeFlash -= dt;
      const fr = Math.pow(FRICTION, dt * 60);
      b.vx *= fr;
      b.vy *= fr;
      if (Math.hypot(b.vx, b.vy) < MIN_SPEED) { b.vx = 0; b.vy = 0; }
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      // 壁反射
      if (b.x - b.r < 0) {
        b.x = b.r;
        b.vx = -b.vx * RESTITUTION_WALL;
        if (Math.abs(b.vx) > 30) { addShake(Math.abs(b.vx) * 0.02); sfxWall(Math.abs(b.vx)); }
      } else if (b.x + b.r > W) {
        b.x = W - b.r;
        b.vx = -b.vx * RESTITUTION_WALL;
        if (Math.abs(b.vx) > 30) { addShake(Math.abs(b.vx) * 0.02); sfxWall(Math.abs(b.vx)); }
      }
      if (b.y - b.r < 0) {
        b.y = b.r;
        b.vy = -b.vy * RESTITUTION_WALL;
        if (Math.abs(b.vy) > 30) { addShake(Math.abs(b.vy) * 0.02); sfxWall(Math.abs(b.vy)); }
      } else if (b.y + b.r > H) {
        b.y = H - b.r;
        b.vy = -b.vy * RESTITUTION_WALL;
        if (Math.abs(b.vy) > 30) { addShake(Math.abs(b.vy) * 0.02); sfxWall(Math.abs(b.vy)); }
      }
    }

    // 衝突
    const mergePairs = [];
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i], b = balls[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        const minDist = a.r + b.r;
        if (dist < minDist && dist > 0) {
          if (a.tier === b.tier && a.tier < TIERS.length - 1) {
            mergePairs.push([i, j]);
            continue;
          }
          // 弾性衝突
          const nx = dx / dist;
          const ny = dy / dist;
          const overlap = minDist - dist;
          const totalMass = a.mass + b.mass;
          a.x -= nx * overlap * (b.mass / totalMass);
          a.y -= ny * overlap * (b.mass / totalMass);
          b.x += nx * overlap * (a.mass / totalMass);
          b.y += ny * overlap * (a.mass / totalMass);
          const rvx = b.vx - a.vx;
          const rvy = b.vy - a.vy;
          const velAlongNormal = rvx * nx + rvy * ny;
          if (velAlongNormal > 0) continue;
          const e = RESTITUTION_BALL;
          const jImp = -(1 + e) * velAlongNormal / (1/a.mass + 1/b.mass);
          const ix = jImp * nx;
          const iy = jImp * ny;
          a.vx -= ix / a.mass;
          a.vy -= iy / a.mass;
          b.vx += ix / b.mass;
          b.vy += iy / b.mass;
          const impactSpeed = Math.abs(velAlongNormal);
          if (impactSpeed > 100) { addShake(Math.min(impactSpeed * 0.015, 4)); sfxCollide(impactSpeed); }
        }
      }
    }

    if (mergePairs.length > 0) {
      const used = new Set();
      const toRemove = new Set();
      for (const [i, j] of mergePairs) {
        if (used.has(i) || used.has(j)) continue;
        used.add(i); used.add(j);
        mergeBalls(balls[i], balls[j]);
        toRemove.add(i); toRemove.add(j);
      }
      const sorted = [...toRemove].sort((x,y) => y - x);
      for (const idx of sorted) balls.splice(idx, 1);
    }

    // パーティクル
    updateParticlesAndTexts(dt);
    // シェイク
    if (shake.amp > 0.05) {
      shake.x = (Math.random() - 0.5) * shake.amp * 2;
      shake.y = (Math.random() - 0.5) * shake.amp * 2;
      shake.amp -= 25 * dt;
      if (shake.amp < 0) shake.amp = 0;
    } else { shake.x = 0; shake.y = 0; }
  }

  function updateParticlesAndTexts(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      p.vx *= 0.96; p.vy *= 0.96;
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.rot += p.vrot * dt;
    }
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
      const t = floatingTexts[i];
      t.life += dt;
      if (t.life >= t.duration) floatingTexts.splice(i, 1);
    }
  }

  function mergeBalls(a, b) {
    const newTier = a.tier + 1;
    const cx = (a.x + b.x) / 2;
    const cy = (a.y + b.y) / 2;
    const vx = (a.vx * a.mass + b.vx * b.mass) / (a.mass + b.mass);
    const vy = (a.vy * a.mass + b.vy * b.mass) / (a.mass + b.mass);
    const newBall = makeBall(cx, cy, newTier, vx, vy);
    newBall.mergeFlash = 0.5;
    balls.push(newBall);

    const gained = TIERS[newTier].score * 10;
    score += gained;
    if (score > bestScore) {
      bestScore = score;
      try { localStorage.setItem('curlMergeBest', String(bestScore)); } catch(e) {}
    }
    if (newTier > maxTierReached) maxTierReached = newTier;
    updateHUD();

    const col = TIERS[newTier];
    const count = 14 + newTier * 6;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 100 + Math.random() * (200 + newTier * 50);
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: 3 + Math.random() * (4 + newTier),
        life: 0.5 + Math.random() * 0.5,
        maxLife: 1,
        color: Math.random() < 0.5 ? col.color : '#ffffff',
        rot: Math.random() * Math.PI,
        vrot: (Math.random() - 0.5) * 12,
      });
    }
    floatingTexts.push({
      x: cx, y: cy - 20,
      text: '+' + gained,
      life: 0,
      duration: 0.9,
      color: newTier >= 3 ? '#ffd54a' : '#ffffff',
      size: 18 + newTier * 4,
    });
    addShake(4 + newTier * 3);
    sfxMerge(newTier);
    // ティアが上がるほど強いバイブ
    vibrate(20 + newTier * 12);
  }

  function addShake(amp) {
    shake.amp = Math.max(shake.amp, Math.min(amp, 18));
  }

  // ========= 背景更新 =========
  function updateBackground(dt) {
    bgTime += dt;

    // 進化レベル（0〜9）に応じた強度
    const lv = maxTierReached;

    // 流れ星：3段階目以降から発生
    if (lv >= 2) {
      const spawnRate = 0.15 + lv * 0.04 + (cleared ? 0.5 : 0);
      if (Math.random() < spawnRate * dt) {
        const fromLeft = Math.random() < 0.5;
        const sx = fromLeft ? -20 : W + 20;
        const sy = Math.random() * H * 0.6;
        const angle = (fromLeft ? 0.4 : Math.PI - 0.4) + (Math.random() - 0.5) * 0.4;
        const speed = 400 + Math.random() * 300;
        shootingStars.push({
          x: sx, y: sy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1.2,
          maxLife: 1.2,
          length: 60 + Math.random() * 80,
        });
      }
    }
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const s = shootingStars[i];
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.life -= dt;
      if (s.life <= 0 || s.x < -100 || s.x > W + 100 || s.y > H + 100) {
        shootingStars.splice(i, 1);
      }
    }

    // 星雲：5段階目以降からフェードイン、7段階目以降で濃く
    let nebulaTarget = 0;
    if (lv >= 4) nebulaTarget = 0.18;
    if (lv >= 6) nebulaTarget = 0.32;
    if (lv >= 8) nebulaTarget = 0.45;
    if (cleared) nebulaTarget = 0.6;
    for (const n of nebulae) {
      n.alpha += (nebulaTarget - n.alpha) * Math.min(1, dt * 0.5);
      n.x += n.drift * dt * 5;
      // 端で折り返し
      if (n.x < -n.r) n.x = W + n.r;
      if (n.x > W + n.r) n.x = -n.r;
    }

    // 銀河の渦：9段階目以降で回り出す
    if (lv >= 8 || cleared) {
      galaxyAngle += dt * (cleared ? 0.5 : 0.2);
    }
  }

  // ========= 背景描画 =========
  function drawBackground() {
    const lv = maxTierReached;

    // 銀河の渦（9段階目以降）
    if (lv >= 8 || cleared) {
      ctx.save();
      ctx.translate(W / 2, H * 0.35);
      ctx.rotate(galaxyAngle);
      const galaxyAlpha = cleared ? 0.5 : 0.3;
      // 螺旋アーム（複数の楕円グラデで簡易表現）
      for (let arm = 0; arm < 3; arm++) {
        ctx.save();
        ctx.rotate((Math.PI * 2 / 3) * arm);
        const grad = ctx.createLinearGradient(-180, 0, 180, 0);
        grad.addColorStop(0, 'rgba(255, 255, 255, 0)');
        grad.addColorStop(0.4, `rgba(180, 200, 255, ${galaxyAlpha * 0.4})`);
        grad.addColorStop(0.5, `rgba(255, 220, 240, ${galaxyAlpha * 0.6})`);
        grad.addColorStop(0.6, `rgba(180, 200, 255, ${galaxyAlpha * 0.4})`);
        grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(0, 0, 200, 25, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      // 中心の明るい核
      const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 60);
      coreGrad.addColorStop(0, `rgba(255, 240, 200, ${galaxyAlpha})`);
      coreGrad.addColorStop(0.5, `rgba(255, 200, 150, ${galaxyAlpha * 0.4})`);
      coreGrad.addColorStop(1, 'rgba(255, 200, 150, 0)');
      ctx.fillStyle = coreGrad;
      ctx.beginPath();
      ctx.arc(0, 0, 60, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // 星雲（5段階目以降）
    for (const n of nebulae) {
      if (n.alpha < 0.01) continue;
      ctx.save();
      const a1 = Math.min(255, Math.max(0, Math.floor(n.alpha * 200)));
      const a2 = Math.min(255, Math.max(0, Math.floor(n.alpha * 80)));
      const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      grad.addColorStop(0, n.color + a1.toString(16).padStart(2, '0'));
      grad.addColorStop(0.5, n.color + a2.toString(16).padStart(2, '0'));
      grad.addColorStop(1, n.color + '00');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // 星（瞬き）。進化が進むほど表示数を増やす
    const starCount = Math.floor(stars.length * (0.4 + lv * 0.07));
    for (let i = 0; i < starCount; i++) {
      const s = stars[i];
      const twinkle = 0.5 + 0.5 * Math.sin(bgTime * s.twinkleSpeed + s.twinklePhase);
      const alpha = s.baseAlpha * (0.4 + twinkle * 0.6);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = s.hue;
      // 大きな星はクロス十字（光芒）も描く
      if (s.r > 1.2) {
        ctx.shadowColor = s.hue;
        ctx.shadowBlur = 4;
      }
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // 流れ星
    for (const s of shootingStars) {
      const k = s.life / s.maxLife;
      ctx.save();
      const speed = Math.hypot(s.vx, s.vy);
      const tx = s.vx / speed;
      const ty = s.vy / speed;
      const tailX = s.x - tx * s.length;
      const tailY = s.y - ty * s.length;
      const grad = ctx.createLinearGradient(s.x, s.y, tailX, tailY);
      grad.addColorStop(0, `rgba(255, 255, 255, ${k})`);
      grad.addColorStop(0.5, `rgba(180, 200, 255, ${k * 0.5})`);
      grad.addColorStop(1, 'rgba(180, 200, 255, 0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(tailX, tailY);
      ctx.stroke();
      // 先頭の輝き
      ctx.fillStyle = `rgba(255, 255, 255, ${k})`;
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ========= 描画 =========
  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    ctx.translate(shake.x, shake.y);

    // 宇宙背景（星・星雲・流れ星・銀河）
    drawBackground();

    drawShooter();

    if (isAiming && canShoot) {
      drawAimLine();
    }

    for (const b of balls) {
      try { drawBall(b); }
      catch (err) { console.error('drawBall error tier=' + b.tier, err); }
    }

    // パーティクル
    for (const p of particles) {
      const alpha = Math.max(0, p.life / p.maxLife);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(0, 0, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    // フローティングテキスト
    for (const t of floatingTexts) {
      const k = t.life / t.duration;
      const alpha = 1 - k;
      const yOff = -k * 60;
      const scale = 0.8 + k * 0.5;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(t.x, t.y + yOff);
      ctx.scale(scale, scale);
      ctx.font = `900 ${t.size}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = 4;
      ctx.strokeStyle = 'rgba(0,0,0,0.7)';
      ctx.strokeText(t.text, 0, 0);
      ctx.fillStyle = t.color;
      ctx.fillText(t.text, 0, 0);
      ctx.restore();
    }

    ctx.restore();
  }

  function drawShooter() {
    ctx.save();
    ctx.fillStyle = 'rgba(40,60,90,0.45)';
    ctx.beginPath();
    ctx.arc(W/2, SHOOTER_Y, 28, Math.PI, Math.PI * 2);
    ctx.lineTo(W/2 + 28, H);
    ctx.lineTo(W/2 - 28, H);
    ctx.closePath();
    ctx.fill();
    if (canShoot) {
      const tier = TIERS[nextTier];
      ctx.save();
      ctx.translate(W/2, SHOOTER_Y);
      const pulse = 1 + Math.sin(performance.now() * 0.005) * 0.05;
      ctx.scale(pulse, pulse);
      drawOrb(0, 0, tier);
      ctx.restore();
    }
    ctx.restore();
  }

  function drawAimLine() {
    const dx = pointerX - W/2;
    const dy = pointerY - SHOOTER_Y;
    const dist = Math.hypot(dx, dy);
    if (dist < 5 || dy > -10) return;
    const nx = dx / dist;
    const ny = dy / dist;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 8]);
    ctx.beginPath();
    let px = W/2 + nx * 30;
    let py = SHOOTER_Y + ny * 30;
    ctx.moveTo(px, py);
    let dirX = nx, dirY = ny;
    let bounces = 2;
    let safety = 100;
    while (bounces > 0 && safety-- > 0) {
      let tMin = Infinity;
      let hitWall = null;
      if (dirX > 0) { const t = (W - px) / dirX; if (t < tMin) { tMin = t; hitWall = 'x'; } }
      else if (dirX < 0) { const t = -px / dirX; if (t < tMin) { tMin = t; hitWall = 'x'; } }
      if (dirY > 0) { const t = (H - py) / dirY; if (t < tMin) { tMin = t; hitWall = 'y'; } }
      else if (dirY < 0) { const t = -py / dirY; if (t < tMin) { tMin = t; hitWall = 'y'; } }
      if (tMin === Infinity || tMin <= 0) break;
      px += dirX * tMin;
      py += dirY * tMin;
      ctx.lineTo(px, py);
      if (hitWall === 'x') dirX = -dirX;
      else dirY = -dirY;
      bounces--;
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawBall(b) {
    drawOrb(b.x, b.y, TIERS[b.tier], b.mergeFlash, b);
  }

  function drawOrb(x, y, tier, flash = 0, ball = null) {
    const r = tier.r;
    // 自転角度（時間ベース）。プレビュー用に ball がない場合は時間のみで擬似自転
    const t = performance.now() * 0.001;
    const rotPhase = ball ? ball.rotPhase : 0;
    const seed = ball ? ball.seed : 0.5;
    const ringTilt = ball ? ball.ringTilt : -0.3;

    ctx.save();
    ctx.translate(x, y);

    // 合体直後の白フラッシュ
    if (flash > 0) {
      ctx.save();
      ctx.globalAlpha = flash;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(0, 0, r * (1 + (1 - flash) * 0.5), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // 影（太陽以外）
    if (!tier.isSun) {
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.4)';
      ctx.shadowBlur = 6;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 4;
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.95, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // 後ろリング（リングのある惑星のみ、本体より奥側）
    if (tier.hasRing) {
      drawPlanetRing(r, ringTilt, true, tier);
    }

    // 惑星本体
    drawPlanetBody(tier, r, t, rotPhase, seed);

    // 前リング
    if (tier.hasRing) {
      drawPlanetRing(r, ringTilt, false, tier);
    }

    ctx.restore();
  }

  // ========= 惑星本体 =========
  function drawPlanetBody(tier, r, t, rotPhase, seed) {
    try {
      switch (tier.type) {
        case 'moon':    return drawMoon(r, rotPhase + t * 0.1, seed);
        case 'mercury': return drawMercury(r, rotPhase + t * 0.15, seed);
        case 'mars':    return drawMars(r, rotPhase + t * 0.2, seed);
        case 'venus':   return drawVenus(r, rotPhase + t * 0.12, seed);
        case 'earth':   return drawEarth(r, rotPhase + t * 0.25, seed);
        case 'neptune': return drawNeptune(r, rotPhase + t * 0.18, seed);
        case 'uranus':  return drawUranus(r, rotPhase + t * 0.15, seed);
        case 'jupiter': return drawJupiter(r, rotPhase + t * 0.3, seed);
        case 'saturn':  return drawSaturn(r, rotPhase + t * 0.22, seed);
        case 'sun':     return drawSun(r, t, seed);
      }
    } catch (err) {
      // エラー時のフォールバック：単色の円を描画して続行
      console.error('drawPlanetBody error:', tier.type, err);
      ctx.fillStyle = tier.color || '#ffaa44';
      ctx.beginPath();
      ctx.arc(0, 0, Math.max(1, r), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 共通：球体ライティング（光源は左上）
  function applySphereLighting(r) {
    const grad = ctx.createRadialGradient(-r*0.4, -r*0.4, r*0.1, 0, 0, r * 1.1);
    grad.addColorStop(0, 'rgba(255,255,255,0.35)');
    grad.addColorStop(0.4, 'rgba(255,255,255,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // 球体クリップ内で模様を描くためのヘルパー
  function clipToCircle(r) {
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.clip();
  }

  // ========= 月 =========
  function drawMoon(r, rot, seed) {
    ctx.save();
    // 本体
    const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
    grad.addColorStop(0, '#e8e3d8');
    grad.addColorStop(0.7, '#b8b2a4');
    grad.addColorStop(1, '#7a7468');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    // クレーター（数個）
    ctx.save();
    clipToCircle(r);
    const craters = [
      [0.2, -0.3, 0.18], [-0.4, 0.2, 0.14], [0.3, 0.4, 0.1],
      [-0.1, -0.5, 0.08], [0.5, 0.1, 0.09],
    ];
    for (const [cx, cy, cr] of craters) {
      // 自転で位置がずれる
      const dx = Math.cos(rot + cx * 3) * r * 0.3 + cx * r;
      const dy = cy * r;
      ctx.fillStyle = 'rgba(110, 100, 88, 0.6)';
      ctx.beginPath();
      ctx.arc(dx, dy, cr * r, 0, Math.PI * 2);
      ctx.fill();
      // 縁の明るい部分
      ctx.strokeStyle = 'rgba(240, 235, 220, 0.4)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.arc(dx, dy, cr * r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
    applySphereLighting(r);
    ctx.restore();
  }

  // ========= 水星 =========
  function drawMercury(r, rot, seed) {
    ctx.save();
    const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
    grad.addColorStop(0, '#d4a878');
    grad.addColorStop(0.7, '#9a6e48');
    grad.addColorStop(1, '#5a3e28');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    // 凹凸（小さなクレーター多数）
    ctx.save();
    clipToCircle(r);
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 + rot * 0.5;
      const dist = r * (0.2 + (i % 3) * 0.2);
      const cx = Math.cos(angle) * dist;
      const cy = Math.sin(angle) * dist - r * 0.1;
      ctx.fillStyle = 'rgba(70, 50, 30, 0.5)';
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.07, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
    applySphereLighting(r);
    ctx.restore();
  }

  // ========= 火星 =========
  function drawMars(r, rot, seed) {
    ctx.save();
    const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
    grad.addColorStop(0, '#e07050');
    grad.addColorStop(0.7, '#b04020');
    grad.addColorStop(1, '#5a1a08');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    // 暗い大陸的な斑点
    ctx.save();
    clipToCircle(r);
    ctx.fillStyle = 'rgba(80, 30, 15, 0.55)';
    const offset = Math.sin(rot) * r * 0.2;
    ctx.beginPath();
    ctx.ellipse(-r*0.2 + offset, r*0.1, r*0.4, r*0.2, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(r*0.3 + offset, -r*0.2, r*0.25, r*0.15, -0.5, 0, Math.PI * 2);
    ctx.fill();
    // 極冠（白い氷）
    ctx.fillStyle = 'rgba(240, 240, 250, 0.85)';
    ctx.beginPath();
    ctx.ellipse(0, -r*0.85, r*0.4, r*0.12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, r*0.85, r*0.3, r*0.1, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    applySphereLighting(r);
    ctx.restore();
  }

  // ========= 金星 =========
  function drawVenus(r, rot, seed) {
    ctx.save();
    const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
    grad.addColorStop(0, '#fff0c0');
    grad.addColorStop(0.6, '#e8b860');
    grad.addColorStop(1, '#806020');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    // 雲の縞（横方向の波打つライン）
    ctx.save();
    clipToCircle(r);
    ctx.strokeStyle = 'rgba(180, 130, 60, 0.4)';
    ctx.lineWidth = 1.5;
    for (let i = -3; i <= 3; i++) {
      const y = i * r * 0.3 + Math.sin(rot + i) * r * 0.05;
      ctx.beginPath();
      ctx.moveTo(-r, y);
      for (let x = -r; x <= r; x += 4) {
        const yy = y + Math.sin(x * 0.1 + rot + i) * 2;
        ctx.lineTo(x, yy);
      }
      ctx.stroke();
    }
    ctx.restore();
    applySphereLighting(r);
    ctx.restore();
  }

  // ========= 地球 =========
  function drawEarth(r, rot, seed) {
    ctx.save();
    // 海
    const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
    grad.addColorStop(0, '#5ab8e8');
    grad.addColorStop(0.7, '#1e6ab0');
    grad.addColorStop(1, '#0a2848');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    // 大陸（緑、自転で位置がずれる）
    ctx.save();
    clipToCircle(r);
    ctx.fillStyle = '#4ca858';
    const off = (rot * 0.5) % (Math.PI * 2);
    // 大陸1
    ctx.beginPath();
    let cx = Math.cos(off) * r * 0.5;
    let cy = -r * 0.2;
    ctx.ellipse(cx, cy, r*0.25, r*0.18, 0.3, 0, Math.PI * 2);
    ctx.fill();
    // 大陸2
    cx = Math.cos(off + 2.1) * r * 0.5;
    cy = r * 0.25;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r*0.3, r*0.15, -0.5, 0, Math.PI * 2);
    ctx.fill();
    // 大陸3（小）
    cx = Math.cos(off + 4) * r * 0.5;
    cy = r * 0.05;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r*0.15, r*0.1, 0, 0, Math.PI * 2);
    ctx.fill();
    // 雲（白い渦、ゆっくり別速度）
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    const cloudOff = rot * 0.3;
    for (let i = 0; i < 3; i++) {
      const a = cloudOff + i * 2.1;
      const ccx = Math.cos(a) * r * 0.45;
      const ccy = Math.sin(a * 0.7) * r * 0.4;
      ctx.beginPath();
      ctx.ellipse(ccx, ccy, r*0.2, r*0.08, a, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
    applySphereLighting(r);
    // 大気のうっすら青いハロ
    ctx.save();
    const haloGrad = ctx.createRadialGradient(0, 0, r*0.95, 0, 0, r*1.15);
    haloGrad.addColorStop(0, 'rgba(120,200,255,0.4)');
    haloGrad.addColorStop(1, 'rgba(120,200,255,0)');
    ctx.fillStyle = haloGrad;
    ctx.beginPath();
    ctx.arc(0, 0, r*1.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.restore();
  }

  // ========= 海王星 =========
  function drawNeptune(r, rot, seed) {
    ctx.save();
    const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
    grad.addColorStop(0, '#5a8cff');
    grad.addColorStop(0.7, '#1e3faa');
    grad.addColorStop(1, '#0a1a55');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    // 横縞の雲帯
    ctx.save();
    clipToCircle(r);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    for (let i = -4; i <= 4; i++) {
      const y = i * r * 0.22;
      ctx.beginPath();
      ctx.moveTo(-r, y);
      for (let x = -r; x <= r; x += 3) {
        const yy = y + Math.sin(x * 0.08 + rot + i * 0.5) * 1.5;
        ctx.lineTo(x, yy);
      }
      ctx.stroke();
    }
    // 大暗斑
    ctx.fillStyle = 'rgba(20, 40, 100, 0.7)';
    const dx = Math.cos(rot) * r * 0.4;
    ctx.beginPath();
    ctx.ellipse(dx, r*0.1, r*0.18, r*0.1, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    applySphereLighting(r);
    ctx.restore();
  }

  // ========= 天王星 =========
  function drawUranus(r, rot, seed) {
    ctx.save();
    const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
    grad.addColorStop(0, '#c0f0ec');
    grad.addColorStop(0.7, '#5fb8b0');
    grad.addColorStop(1, '#1e5854');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    // ほのかな縦縞（横倒しの自転軸を表現）
    ctx.save();
    clipToCircle(r);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    for (let i = -3; i <= 3; i++) {
      const x = i * r * 0.25 + Math.sin(rot) * 2;
      ctx.beginPath();
      ctx.moveTo(x, -r);
      ctx.lineTo(x, r);
      ctx.stroke();
    }
    ctx.restore();
    applySphereLighting(r);
    ctx.restore();
  }

  // ========= 木星 =========
  function drawJupiter(r, rot, seed) {
    ctx.save();
    // 縞模様の本体
    const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
    grad.addColorStop(0, '#f0d8a8');
    grad.addColorStop(0.7, '#b88858');
    grad.addColorStop(1, '#5a3818');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    // 横縞（特徴的な帯）
    ctx.save();
    clipToCircle(r);
    const bands = [
      { y: -0.7, h: 0.12, color: 'rgba(220, 190, 150, 0.7)' },
      { y: -0.45, h: 0.18, color: 'rgba(120, 80, 50, 0.5)' },
      { y: -0.15, h: 0.15, color: 'rgba(240, 215, 175, 0.6)' },
      { y: 0.1,  h: 0.18, color: 'rgba(110, 70, 40, 0.6)' },
      { y: 0.4,  h: 0.15, color: 'rgba(200, 165, 130, 0.5)' },
      { y: 0.7,  h: 0.12, color: 'rgba(140, 100, 70, 0.5)' },
    ];
    for (const b of bands) {
      ctx.fillStyle = b.color;
      // 帯を波打たせる
      ctx.beginPath();
      ctx.moveTo(-r, b.y * r);
      for (let x = -r; x <= r; x += 3) {
        const yy = b.y * r + Math.sin(x * 0.05 + rot + b.y * 4) * 2;
        ctx.lineTo(x, yy);
      }
      ctx.lineTo(r, (b.y + b.h) * r);
      for (let x = r; x >= -r; x -= 3) {
        const yy = (b.y + b.h) * r + Math.sin(x * 0.05 + rot + b.y * 4) * 2;
        ctx.lineTo(x, yy);
      }
      ctx.closePath();
      ctx.fill();
    }
    // 大赤斑
    const grsX = Math.cos(rot * 1.0) * r * 0.4;
    const grsY = r * 0.25;
    ctx.fillStyle = '#c84838';
    ctx.beginPath();
    ctx.ellipse(grsX, grsY, r*0.15, r*0.08, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(220, 100, 80, 0.6)';
    ctx.beginPath();
    ctx.ellipse(grsX, grsY, r*0.18, r*0.1, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    applySphereLighting(r);
    ctx.restore();
  }

  // ========= 土星本体 =========
  function drawSaturn(r, rot, seed) {
    ctx.save();
    const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
    grad.addColorStop(0, '#f5e2b8');
    grad.addColorStop(0.7, '#c8a070');
    grad.addColorStop(1, '#705028');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    // 控えめな横縞
    ctx.save();
    clipToCircle(r);
    const bands = [
      { y: -0.5, h: 0.2, color: 'rgba(230, 200, 150, 0.4)' },
      { y: -0.1, h: 0.2, color: 'rgba(180, 140, 90, 0.4)' },
      { y: 0.3, h: 0.25, color: 'rgba(220, 185, 130, 0.4)' },
    ];
    for (const b of bands) {
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.moveTo(-r, b.y * r);
      for (let x = -r; x <= r; x += 3) {
        const yy = b.y * r + Math.sin(x * 0.04 + rot + b.y * 3) * 1.5;
        ctx.lineTo(x, yy);
      }
      ctx.lineTo(r, (b.y + b.h) * r);
      for (let x = r; x >= -r; x -= 3) {
        const yy = (b.y + b.h) * r + Math.sin(x * 0.04 + rot + b.y * 3) * 1.5;
        ctx.lineTo(x, yy);
      }
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    applySphereLighting(r);
    ctx.restore();
  }

  // ========= 太陽（シンプルで確実な描画） =========
  function drawSun(r, t, seed) {
    const safeR = Math.max(2, r);
    ctx.save();

    // 1. コロナ（外側のグロー）：r0=0で安全に
    const corona = ctx.createRadialGradient(0, 0, 0, 0, 0, safeR * 2);
    corona.addColorStop(0, 'rgba(255, 200, 80, 0)');
    corona.addColorStop(0.4, 'rgba(255, 180, 60, 0)');
    corona.addColorStop(0.5, 'rgba(255, 160, 40, 0.45)');
    corona.addColorStop(1, 'rgba(255, 80, 20, 0)');
    ctx.fillStyle = corona;
    ctx.beginPath();
    ctx.arc(0, 0, safeR * 2, 0, Math.PI * 2);
    ctx.fill();

    // 2. フレア（細い線で放射）
    ctx.strokeStyle = 'rgba(255, 180, 60, 0.6)';
    ctx.lineCap = 'round';
    for (let i = 0; i < 8; i++) {
      const a = i / 8 * Math.PI * 2 + t * 0.3;
      const flareLen = safeR * (0.3 + Math.abs(Math.sin(t * 2 + i)) * 0.4);
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * safeR * 0.95, Math.sin(a) * safeR * 0.95);
      ctx.lineTo(Math.cos(a) * (safeR + flareLen), Math.sin(a) * (safeR + flareLen));
      ctx.stroke();
    }

    // 3. 本体（r0=0で安全な放射グラデ）
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, safeR);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.3, '#fff4c0');
    grad.addColorStop(0.7, '#ffc040');
    grad.addColorStop(1, '#ff6020');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, safeR, 0, Math.PI * 2);
    ctx.fill();

    // 4. 表面に小さな赤い斑点（黒点）
    ctx.fillStyle = 'rgba(200, 60, 20, 0.4)';
    for (let i = 0; i < 4; i++) {
      const a = i / 4 * Math.PI * 2 + t * 0.5;
      const dist = safeR * 0.5;
      const sx = Math.cos(a) * dist;
      const sy = Math.sin(a) * dist;
      ctx.beginPath();
      ctx.arc(sx, sy, safeR * 0.08, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  // ========= リング（土星・天王星） =========
  function drawPlanetRing(r, tilt, isBack, tier) {
    ctx.save();
    // 天王星はリングが縦向き（横倒し自転）
    if (tier.type === 'uranus') {
      ctx.rotate(Math.PI / 2);
    }
    const ringHeight = Math.max(0.15, Math.abs(tilt));

    // リングの色
    const isSaturn = tier.type === 'saturn';
    // 半円ぶん（前または後ろ）を太い線で描く
    const startAngle = isBack ? Math.PI : 0;
    const endAngle = isBack ? Math.PI * 2 : Math.PI;

    if (isSaturn) {
      // 土星：太い帯＋細い隙間ライン
      // 太い帯（外周〜内周にかけて複数の同心リングをstroke）
      const ringSpecs = [
        { rad: 1.85, width: r * 0.18, color: 'rgba(220, 200, 160, 0.85)' },
        { rad: 1.55, width: r * 0.12, color: 'rgba(190, 170, 130, 0.7)' },
        { rad: 1.35, width: r * 0.08, color: 'rgba(230, 210, 170, 0.6)' },
      ];
      for (const spec of ringSpecs) {
        ctx.strokeStyle = spec.color;
        ctx.lineWidth = spec.width;
        ctx.beginPath();
        ctx.ellipse(0, 0, r * spec.rad, r * spec.rad * ringHeight, 0, startAngle, endAngle);
        ctx.stroke();
      }
    } else {
      // 天王星：薄いリング1本
      ctx.strokeStyle = 'rgba(180, 220, 220, 0.55)';
      ctx.lineWidth = r * 0.08;
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 1.6, r * 1.6 * ringHeight, 0, startAngle, endAngle);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ========= HUD =========
  function updateHUD() {
    scoreEl.textContent = score.toLocaleString();
    bestEl.textContent = bestScore.toLocaleString();
    maxTierEl.textContent = (maxTierReached + 1) + '/' + TIERS.length;
  }
  function updateNextDisplay() {
    const t = TIERS[nextTier];
    nextOrb.style.background = `radial-gradient(circle at 30% 30%, #fff8, ${t.color} 60%, #0006)`;
    nextLabel.textContent = t.name;
  }

  function init() {
    balls = [];
    particles = [];
    floatingTexts = [];
    score = 0;
    maxTierReached = 0;
    nextTier = randTier();
    canShoot = true;
    isAiming = false;
    cleared = false;
    clearTime = 0;
    initBackground();
    updateHUD();
    updateNextDisplay();
  }

  function loop(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    try {
      update(dt);
      draw();
    } catch (err) {
      console.error('Game loop error:', err, err && err.stack);
    }
    requestAnimationFrame(loop);
  }

  init();
  requestAnimationFrame(loop);
})();
</script>
